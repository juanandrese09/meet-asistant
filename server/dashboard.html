<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meet Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-0:#060c1a;
  --bg-1:#0d1f3c;
  --bg-2:#162340;
  --bg-3:#1e2d4a;
  --panel: rgba(255,255,255,0.025);
  --panel-2: rgba(255,255,255,0.04);
  --glass: rgba(255,255,255,0.03);
  --cyan:#06b6d4;
  --cyan-light:#22d3ee;
  --blue:#3b82f6;
  --green:#22c55e;
  --green-dim:#16a34a;
  --amber:#f59e0b;
  --red:#ef4444;
  --purple:#a855f7;
  --text-1:#f1f5f9;
  --text-2:#cbd5e1;
  --text-3:#94a3b8;
  --text-4:#64748b;
  --border:rgba(148,163,184,0.1);
  --border-strong:rgba(148,163,184,0.18);
  --radius-sm:8px;
  --radius:12px;
  --radius-lg:16px;
  --sidebar:320px;
  --ease:cubic-bezier(0.4,0,0.2,1);
  --font:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
}
html,body{height:100%;font-family:var(--font);background:var(--bg-0);color:var(--text-1);overflow:hidden;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}

/* Ambient glow background */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 800px 500px at 0% 0%, rgba(6,182,212,0.08), transparent 60%),
    radial-gradient(ellipse 600px 400px at 100% 100%, rgba(59,130,246,0.06), transparent 60%);
}

/* Scrollbars */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(148,163,184,0.15);border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:rgba(148,163,184,0.3)}

.app{display:flex;height:100vh;flex-direction:column;position:relative;z-index:1}

/* Top Bar */
.topbar{
  display:flex;align-items:center;gap:16px;padding:0 28px;
  height:64px;flex-shrink:0;
  background: rgba(6,12,26,0.6);
  border-bottom:1px solid var(--border);
  backdrop-filter: blur(12px) saturate(140%);
  -webkit-backdrop-filter: blur(12px) saturate(140%);
}
.brand{display:flex;align-items:center;gap:10px;font-size:16px;font-weight:700;color:var(--text-1);letter-spacing:-0.3px;margin-right:auto;text-decoration:none;cursor:pointer}
.brand-icon{
  width:32px;height:32px;border-radius:9px;
  background:linear-gradient(135deg,var(--cyan),var(--blue));
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  box-shadow:0 4px 12px rgba(6,182,212,0.3);
}
.brand-icon svg{width:17px;height:17px;color:white}
.topbar-stats{display:flex;align-items:center;gap:20px}
.tstat{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-3)}
.tstat strong{color:var(--text-1);font-weight:600;font-size:13px}
.status-badge{
  display:inline-flex;align-items:center;gap:6px;padding:5px 11px;
  border-radius:99px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;
}
.status-badge.ok{background:rgba(34,197,94,0.1);color:var(--green);border:1px solid rgba(34,197,94,0.25)}
.status-badge.err{background:rgba(239,68,68,0.1);color:var(--red);border:1px solid rgba(239,68,68,0.25)}
.status-badge .dot{width:6px;height:6px;border-radius:50%;background:currentColor;box-shadow:0 0 6px currentColor}
.mobile-toggle{
  display:none;width:36px;height:36px;border-radius:8px;
  background:var(--panel);border:1px solid var(--border);color:var(--text-2);
  cursor:pointer;align-items:center;justify-content:center;
}
.mobile-toggle svg{width:18px;height:18px}

.main{display:flex;flex:1;overflow:hidden}

/* Sidebar */
.sidebar{
  width:var(--sidebar);min-width:var(--sidebar);
  background:rgba(13,31,60,0.5);
  backdrop-filter:blur(10px);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
  transition:transform .3s var(--ease);
}
.sidebar-top{padding:14px 14px 10px;flex-shrink:0}
.search-wrap{position:relative}
.search-wrap input{
  width:100%;padding:10px 12px 10px 36px;
  background:var(--panel-2);border:1px solid var(--border);
  border-radius:10px;color:var(--text-1);font-size:13px;
  font-family:var(--font);outline:none;
  transition:all .2s var(--ease);
}
.search-wrap input::placeholder{color:var(--text-4)}
.search-wrap input:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(6,182,212,0.12);background:var(--bg-2)}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--text-4);pointer-events:none}

.sidebar-filters{display:flex;gap:6px;padding:0 14px 12px;flex-shrink:0}
.filter-btn{
  padding:5px 11px;border-radius:99px;border:1px solid var(--border);
  background:transparent;color:var(--text-3);font-size:11px;font-weight:500;
  font-family:var(--font);cursor:pointer;transition:all .15s var(--ease);white-space:nowrap;
}
.filter-btn:hover{border-color:var(--cyan);color:var(--cyan-light)}
.filter-btn.active{background:rgba(6,182,212,0.12);border-color:var(--cyan);color:var(--cyan-light)}

.meeting-list{flex:1;overflow-y:auto;padding:0 10px 16px}

.month-label{
  padding:10px 10px 6px;font-size:10px;font-weight:700;
  color:var(--text-4);text-transform:uppercase;letter-spacing:0.8px;
}

/* Meeting card */
.mcard{
  padding:12px 14px;margin-bottom:5px;
  background:transparent;border:1px solid transparent;
  border-radius:var(--radius);cursor:pointer;
  transition:all .18s var(--ease);position:relative;
}
.mcard:hover{background:var(--panel-2);border-color:var(--border-strong)}
.mcard.active{
  background:linear-gradient(135deg, rgba(6,182,212,0.1), rgba(59,130,246,0.05));
  border-color:rgba(6,182,212,0.35);
}
.mcard-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.mcard-date{font-size:11px;color:var(--text-4);font-weight:500}
.mcard-duration{font-size:10px;color:var(--text-4);display:flex;align-items:center;gap:3px}
.mcard-duration svg{width:10px;height:10px}
.mcard-title{font-size:13px;font-weight:600;color:var(--text-1);line-height:1.4;margin-bottom:4px;
  display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
.mcard-preview{font-size:11px;color:var(--text-4);line-height:1.5;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* Content */
.content{flex:1;overflow-y:auto;display:flex;flex-direction:column}

.empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex:1;text-align:center;padding:48px 32px;gap:16px;animation:fadeUp .3s var(--ease);
}
.empty-icon{
  width:72px;height:72px;border-radius:20px;
  background:linear-gradient(135deg,rgba(6,182,212,0.1),rgba(59,130,246,0.05));
  border:1px solid rgba(6,182,212,0.2);
  display:flex;align-items:center;justify-content:center;
  color:var(--cyan);
}
.empty-icon svg{width:34px;height:34px}
.empty h2{font-size:18px;font-weight:600;color:var(--text-2)}
.empty p{font-size:13px;color:var(--text-4);max-width:360px;line-height:1.6}

/* Overview */
.overview{padding:32px 36px;flex:1;overflow-y:auto}
.overview-greeting{font-size:24px;font-weight:700;color:var(--text-1);margin-bottom:4px;letter-spacing:-0.4px}
.overview-sub{font-size:13px;color:var(--text-3);margin-bottom:28px}

.stat-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:32px}
.stat-card{
  background:linear-gradient(135deg,var(--panel-2),var(--panel));
  border:1px solid var(--border);
  backdrop-filter: blur(8px);
  border-radius:var(--radius-lg);padding:20px;
  transition:all .2s var(--ease);
  position:relative;overflow:hidden;
}
.stat-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,var(--_c1,transparent),transparent 70%);
  opacity:0.06;pointer-events:none;
}
.stat-card:hover{transform:translateY(-2px);border-color:var(--border-strong)}
.stat-card.blue{--_c1:var(--blue)}
.stat-card.amber{--_c1:var(--amber)}
.stat-card.green{--_c1:var(--green)}
.stat-card.cyan{--_c1:var(--cyan)}
.stat-card-label{font-size:11px;font-weight:600;color:var(--text-4);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.stat-card-label svg{width:13px;height:13px}
.stat-card-value{font-size:30px;font-weight:700;color:var(--text-1);line-height:1;margin-bottom:4px;letter-spacing:-0.5px}
.stat-card-sub{font-size:11px;color:var(--text-4)}
.stat-card.blue .stat-card-value{background:linear-gradient(135deg,var(--blue),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-card.green .stat-card-value{color:var(--green)}
.stat-card.amber .stat-card-value{color:var(--amber)}
.stat-card.cyan .stat-card-value{color:var(--cyan-light)}

.recent-title{font-size:13px;font-weight:700;color:var(--text-3);margin-bottom:12px;text-transform:uppercase;letter-spacing:0.5px}
.recent-list{display:flex;flex-direction:column;gap:8px}
.recent-item{
  display:flex;align-items:center;gap:14px;padding:14px 16px;
  background:var(--glass);border:1px solid var(--border);border-radius:var(--radius-lg);
  cursor:pointer;transition:all .18s var(--ease);
}
.recent-item:hover{transform:translateY(-2px);border-color:rgba(6,182,212,0.35);background:var(--panel-2)}
.recent-item-icon{
  width:38px;height:38px;border-radius:10px;
  background:linear-gradient(135deg,rgba(6,182,212,0.15),rgba(59,130,246,0.08));
  border:1px solid rgba(6,182,212,0.2);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.recent-item-icon svg{width:17px;height:17px;color:var(--cyan-light)}
.recent-item-body{flex:1;min-width:0}
.recent-item-title{font-size:13px;font-weight:600;color:var(--text-1);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.recent-item-date{font-size:11px;color:var(--text-4)}
.recent-item-arrow{color:var(--text-4);flex-shrink:0;transition:transform .15s}
.recent-item:hover .recent-item-arrow{transform:translateX(3px);color:var(--cyan)}
.recent-item-arrow svg{width:14px;height:14px}

/* Detail */
.detail{padding:0;display:flex;flex-direction:column;flex:1;animation:fadeUp .3s var(--ease)}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

.detail-header{
  padding:24px 36px 0;border-bottom:1px solid var(--border);
  flex-shrink:0;background:rgba(13,31,60,0.25);
}
.detail-breadcrumb{font-size:11px;color:var(--text-4);margin-bottom:14px;display:flex;align-items:center;gap:6px}
.detail-breadcrumb a{color:var(--text-4);text-decoration:none;transition:color .15s}
.detail-breadcrumb a:hover{color:var(--cyan-light)}
.detail-breadcrumb svg{width:12px;height:12px}
.detail-title{font-size:22px;font-weight:700;color:var(--text-1);line-height:1.3;margin-bottom:10px;letter-spacing:-0.3px}
.detail-meta{display:flex;align-items:center;gap:18px;margin-bottom:18px;flex-wrap:wrap}
.dmeta{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text-3)}
.dmeta svg{width:13px;height:13px;color:var(--text-4)}

.detail-actions{display:flex;gap:8px;margin-left:auto}

/* Buttons */
.btn{
  display:inline-flex;align-items:center;gap:7px;padding:8px 14px;
  border:1px solid var(--border);border-radius:9px;
  font-size:12px;font-weight:600;font-family:var(--font);
  cursor:pointer;transition:all .15s var(--ease);text-decoration:none;
  background:var(--panel-2);color:var(--text-2);
}
.btn:hover{border-color:var(--cyan);color:var(--cyan-light);background:rgba(6,182,212,0.06)}
.btn svg{width:13px;height:13px}
.btn-danger:hover{border-color:var(--red);color:var(--red);background:rgba(239,68,68,0.08)}

/* Export dropdown */
.export-wrap{position:relative;display:inline-block}
.export-menu{
  position:absolute;top:calc(100% + 4px);right:0;
  min-width:160px;background:var(--bg-2);
  border:1px solid var(--border-strong);border-radius:10px;
  padding:6px;z-index:10;box-shadow:0 10px 30px rgba(0,0,0,0.4);
  display:none;animation:fadeUp .15s var(--ease);
}
.export-menu.show{display:block}
.export-menu a{
  display:flex;align-items:center;gap:8px;padding:8px 10px;
  border-radius:6px;font-size:12px;color:var(--text-2);text-decoration:none;
  cursor:pointer;
}
.export-menu a:hover{background:var(--panel-2);color:var(--text-1)}
.export-menu a svg{width:13px;height:13px;color:var(--text-4)}

/* Tabs */
.tabs{display:flex;gap:0;border-bottom:none;padding:0;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{
  padding:11px 16px;font-size:13px;font-weight:500;color:var(--text-3);
  cursor:pointer;border-bottom:2px solid transparent;transition:all .18s var(--ease);
  white-space:nowrap;display:flex;align-items:center;gap:6px;
}
.tab:hover{color:var(--text-1)}
.tab.active{color:var(--cyan-light);border-bottom-color:var(--cyan)}
.tab-badge{
  background:rgba(245,158,11,0.18);color:var(--amber);
  border-radius:99px;padding:1px 7px;font-size:10px;font-weight:700;
}

.tab-content{flex:1;overflow-y:auto;padding:28px 36px}

.block{margin-bottom:28px}
.block-title{
  display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;
  color:var(--text-3);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:14px;
}
.block-title svg{width:15px;height:15px;color:var(--text-4)}
.block-body{font-size:14px;line-height:1.75;color:var(--text-2)}
.block-body p{margin-bottom:10px}
.block-body p:last-child{margin-bottom:0}

.kp-list{display:flex;flex-direction:column;gap:8px}
.kp-item{
  display:flex;gap:12px;padding:13px 16px;
  background:var(--panel-2);border:1px solid var(--border);border-radius:10px;
  transition:all .15s;
}
.kp-item:hover{border-color:rgba(59,130,246,0.3)}
.kp-dot{width:6px;height:6px;border-radius:50%;background:var(--cyan);margin-top:7px;flex-shrink:0;box-shadow:0 0 8px var(--cyan)}
.kp-text{font-size:13px;color:var(--text-2);line-height:1.6}

.action-list{display:flex;flex-direction:column;gap:8px}
.action-item{
  display:flex;align-items:flex-start;gap:12px;padding:13px 16px;
  background:rgba(245,158,11,0.05);border:1px solid rgba(245,158,11,0.2);
  border-radius:10px;transition:all .15s;
}
.action-item:hover{background:rgba(245,158,11,0.08)}
.action-check{
  width:18px;height:18px;border-radius:5px;border:1.5px solid rgba(245,158,11,0.5);
  background:transparent;flex-shrink:0;margin-top:1px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .15s;
}
.action-check:hover{border-color:var(--amber);background:rgba(245,158,11,0.12)}
.action-check.done{background:var(--amber);border-color:var(--amber)}
.action-check.done::after{content:'✓';font-size:11px;color:#000;font-weight:800}
.action-text{font-size:13px;color:var(--text-2);line-height:1.6;flex:1}
.action-text.done{text-decoration:line-through;color:var(--text-4)}

.decision-list{display:flex;flex-direction:column;gap:8px}
.decision-item{
  display:flex;gap:12px;padding:13px 16px;
  background:rgba(34,197,94,0.05);border:1px solid rgba(34,197,94,0.2);
  border-radius:10px;transition:all .15s;
}
.decision-item:hover{background:rgba(34,197,94,0.08)}
.decision-icon{flex-shrink:0;margin-top:2px}
.decision-icon svg{width:14px;height:14px;color:var(--green)}
.decision-text{font-size:13px;color:var(--text-2);line-height:1.6}

.transcript-box{
  background:var(--panel-2);border:1px solid var(--border);border-radius:var(--radius);
  padding:20px;font-size:13px;line-height:1.9;color:var(--text-2);
  white-space:pre-wrap;word-break:break-word;max-height:600px;overflow-y:auto;
  font-family:'ui-monospace','Cascadia Code','Source Code Pro',monospace;
}

.report-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px}
.report-stat{
  background:var(--panel-2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;
}
.report-stat-label{font-size:11px;color:var(--text-4);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px}
.report-stat-value{font-size:24px;font-weight:700;color:var(--text-1);letter-spacing:-0.3px}
.report-stat-value.green{color:var(--green)}
.report-stat-value.amber{color:var(--amber)}
.report-stat-value.cyan{color:var(--cyan-light)}
.report-section-title{font-size:13px;font-weight:700;color:var(--text-3);margin:24px 0 12px;text-transform:uppercase;letter-spacing:0.5px}

.raw-content{font-size:13px;line-height:1.75;color:var(--text-2)}
.raw-content h1,.raw-content h2,.raw-content h3{color:var(--text-1);font-weight:600;margin:16px 0 8px}
.raw-content h1{font-size:18px}
.raw-content h2{font-size:16px}
.raw-content h3{font-size:14px}
.raw-content p{margin-bottom:10px}
.raw-content ul,.raw-content ol{padding-left:20px;margin:8px 0}
.raw-content li{margin-bottom:5px}
.raw-content li::marker{color:var(--cyan)}
.raw-content strong{color:var(--text-1);font-weight:600}
.raw-content hr{border:none;border-top:1px solid var(--border);margin:16px 0}
.raw-content code{background:var(--bg-3);padding:2px 6px;border-radius:4px;font-size:12px;color:var(--cyan-light)}

.loading{display:flex;align-items:center;justify-content:center;flex:1;min-height:300px}
.spinner{width:32px;height:32px;border:2.5px solid rgba(6,182,212,0.15);border-top-color:var(--cyan);border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Toast notifications */
.toast-container{
  position:fixed;top:80px;right:24px;z-index:1000;
  display:flex;flex-direction:column;gap:10px;max-width:360px;
}
.toast{
  padding:14px 16px;border-radius:12px;
  background:var(--bg-2);border:1px solid var(--border-strong);
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
  display:flex;align-items:flex-start;gap:12px;
  animation:toastIn .3s var(--ease);
  min-width:280px;
}
.toast.success{border-color:rgba(34,197,94,0.3);background:linear-gradient(135deg,rgba(34,197,94,0.08),var(--bg-2))}
.toast.error{border-color:rgba(239,68,68,0.3);background:linear-gradient(135deg,rgba(239,68,68,0.08),var(--bg-2))}
.toast.info{border-color:rgba(6,182,212,0.3)}
.toast-icon{flex-shrink:0;margin-top:1px}
.toast-icon svg{width:18px;height:18px}
.toast.success .toast-icon{color:var(--green)}
.toast.error .toast-icon{color:var(--red)}
.toast.info .toast-icon{color:var(--cyan)}
.toast-body{flex:1;min-width:0}
.toast-title{font-size:13px;font-weight:600;color:var(--text-1);margin-bottom:2px}
.toast-msg{font-size:12px;color:var(--text-3);line-height:1.5}
.toast-close{
  background:transparent;border:none;color:var(--text-4);
  cursor:pointer;padding:2px;border-radius:4px;font-size:16px;line-height:1;
  flex-shrink:0;
}
.toast-close:hover{color:var(--text-1)}
@keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}

/* Modal */
.modal-overlay{
  position:fixed;inset:0;z-index:999;
  background:rgba(6,12,26,0.75);backdrop-filter:blur(4px);
  display:none;align-items:center;justify-content:center;
  animation:fadeIn .2s ease;padding:20px;
}
.modal-overlay.show{display:flex}
.modal{
  background:var(--bg-2);border:1px solid var(--border-strong);
  border-radius:16px;padding:24px;max-width:400px;width:100%;

}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* Responsive */

</div>

<script>
const API = window.location.origin;
let allMeetings = [];
let activeMeeting = null;
let activeFilter = 'all';
let activeTab = 'summary';
let doneActions = {};

function loadDoneActions(){
  try{ const raw=localStorage.getItem('ma_done_actions'); if(raw) doneActions=JSON.parse(raw); }catch(e){ doneActions={}; }
}
function saveDoneActions(){ try{ localStorage.setItem('ma_done_actions', JSON.stringify(doneActions)); }catch(e){} }

const I = {
  mic:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>',
  cal:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>',
  doc:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>',
  star:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>',
  check:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>',
  decide:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 8 12 12 14 14"/></svg>',
  msg:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>',
  chart:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>',
  dl:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>',
  arrow:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>',
  trash:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>',
  clock:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',
  ok:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>',
  err:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>',
  info:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>',
};

// Date helpers
function parseDate(str){
  try{ const c=str.replace(/T.*/,'').split(':').join('-'); const d=new Date(c); return isNaN(d.getTime())?new Date():d; }catch{return new Date()}
}
function fmtShort(str){ return parseDate(str).toLocaleDateString('es-MX',{day:'numeric',month:'short'}); }
function fmtFull(str){ return parseDate(str).toLocaleDateString('es-MX',{weekday:'long',day:'numeric',month:'long',year:'numeric'}); }
function fmtMonth(str){ return parseDate(str).toLocaleDateString('es-MX',{month:'long',year:'numeric'}).replace(/^\w/,c=>c.toUpperCase()); }
function fmtDuration(ms){
  if(!ms) return null;
  const s=Math.floor(ms/1000);
  const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sec=s%60;
  if(h>0) return `${h}h ${m}m`;
  if(m>0) return `${m}m ${sec}s`;
  return `${sec}s`;
}
function greeting(){
  const h=new Date().getHours();
  if(h<5) return 'Buenas noches';
  if(h<12) return 'Buenos días';
  if(h<19) return 'Buenas tardes';
  return 'Buenas noches';
}

// Markdown
function md(text){
  if(!text) return '';
  let h=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>').replace(/^## (.+)$/gm,'<h2>$1</h2>').replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/^---+$/gm,'<hr>').replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/^[\-\*•] (.+)$/gm,'<li>$1</li>').replace(/^\d+\. (.+)$/gm,'<li>$1</li>');
  h=h.replace(/((?:<li>[\s\S]*?<\/li>\n?)+)/g,'<ul>$1</ul>');
  h=h.split('\n\n').map(b=>{b=b.trim();if(!b)return '';if(/^<[huo]|^<hr/.test(b))return b;return '<p>'+b.replace(/\n/g,'<br>')+'</p>';}).join('\n');
  return h;
}

function extractSections(content){
  const s={summary:'',keyPoints:[],actionItems:[],decisions:[],raw:content};
  const parts=content.split(/^##\s+/m);
  for(const part of parts){
    const lo=part.toLowerCase(); const body=part.replace(/^[^\n]+\n/,'').trim();
    if(lo.startsWith('resumen')) s.summary=body;
    else if(lo.startsWith('puntos')) s.keyPoints=parseList(body);
    else if(lo.startsWith('action')||lo.startsWith('tarea')||lo.startsWith('acci')) s.actionItems=parseList(body);
    else if(lo.startsWith('decisi')) s.decisions=parseList(body);
  }
  return s;
}
function parseList(text){
  const items=[];
  text.split('\n').forEach(line=>{ const m=line.match(/^[-*•\d.]+\s+(.+)/); if(m && m[1].trim()) items.push(m[1].trim()); });
  return items.length?items:(text.trim()?[text.trim()]:[]);
}
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Toasts
function toast(type, title, msg, duration=4500){
  const container=document.getElementById('toasts');
  const el=document.createElement('div');
  el.className=`toast ${type}`;
  const icon = type==='success'?I.ok: type==='error'?I.err: I.info;
  el.innerHTML=`
    <div class="toast-icon">${icon}</div>
    <div class="toast-body">
      <div class="toast-title">${esc(title)}</div>
      <div class="toast-msg">${esc(msg||'')}</div>
    </div>
    <button class="toast-close" aria-label="Cerrar">×</button>
  `;
  const close=()=>{ el.style.opacity='0'; el.style.transform='translateX(20px)'; setTimeout(()=>el.remove(),200); };
  el.querySelector('.toast-close').onclick=close;
  container.appendChild(el);
  if(duration>0) setTimeout(close, duration);
}

// Modal
let modalConfirmHandler=null;
function confirmAction(title, text, confirmLabel='Eliminar'){
  return new Promise(resolve=>{
    document.getElementById('modal-title').textContent=title;
    document.getElementById('modal-text').textContent=text;
    const btn=document.getElementById('modal-confirm');
    btn.textContent=confirmLabel;
    document.getElementById('modal').classList.add('show');
    if(modalConfirmHandler) btn.removeEventListener('click', modalConfirmHandler);
    modalConfirmHandler=()=>{ closeModal(); resolve(true); };
    btn.addEventListener('click', modalConfirmHandler, {once:true});
    // Cancel = resolve false on close
    const cancelFn=()=>resolve(false);
    document.getElementById('modal').__cancel=cancelFn;
  });
}
function closeModal(){
  const m=document.getElementById('modal');
  m.classList.remove('show');
  if(m.__cancel){ m.__cancel(); m.__cancel=null; }
}

// Sidebar toggle (mobile)
function toggleSidebar(force){
  const sb=document.getElementById('sidebar');
  const ov=document.getElementById('sidebar-overlay');
  const willOpen = force!==undefined ? force : !sb.classList.contains('open');
  sb.classList.toggle('open', willOpen);
  ov.classList.toggle('show', willOpen);
}

// Overview
function showOverview(){
  activeMeeting=null;
  renderSidebar();
  toggleSidebar(false);
  const recent=[...allMeetings].slice(0,5);
  const content=document.getElementById('content');
  const totalActions = allMeetings.reduce((sum,m)=>{
    const s=extractSections(m.preview||''); return sum + s.actionItems.length;
  }, 0);
  document.getElementById('stat-actions').textContent = totalActions || '0';

  content.innerHTML=`
  <div class="overview">
    <div class="overview-greeting">${greeting()} 👋</div>
    <div class="overview-sub">Aquí tienes un resumen de tus reuniones.</div>
    <div class="stat-cards">
      <div class="stat-card blue">
        <div class="stat-card-label">${I.mic} Reuniones</div>
        <div class="stat-card-value">${allMeetings.length}</div>
        <div class="stat-card-sub">grabadas en total</div>
      </div>
      <div class="stat-card cyan">
        <div class="stat-card-label">${I.cal} Este mes</div>
        <div class="stat-card-value" id="ov-month">0</div>
        <div class="stat-card-sub">reuniones</div>
      </div>
      <div class="stat-card amber">
        <div class="stat-card-label">${I.check} Tareas</div>
        <div class="stat-card-value">${totalActions}</div>
        <div class="stat-card-sub">pendientes</div>
      </div>
      <div class="stat-card green">
        <div class="stat-card-label">${I.ok} Servidor</div>
        <div class="stat-card-value" style="font-size:20px" id="ov-status">...</div>
        <div class="stat-card-sub">estado</div>
      </div>
    </div>
    ${recent.length ? `
    <div class="recent-title">Reuniones recientes</div>
    <div class="recent-list">
      ${recent.map(m=>`
      <div class="recent-item" onclick="selectMeeting('${esc(m.file)}')">
        <div class="recent-item-icon">${I.mic}</div>
        <div class="recent-item-body">
          <div class="recent-item-title">${esc(m.title)}</div>
          <div class="recent-item-date">${fmtFull(m.date)}</div>
        </div>
        <div class="recent-item-arrow">${I.arrow}</div>
      </div>`).join('')}
    </div>` : `
    <div class="empty" style="padding:40px 24px">
      <div class="empty-icon">${I.mic}</div>
      <h2>Aún no hay reuniones</h2>
      <p>Usa la extensión de Chrome en una pestaña de Google Meet para empezar a grabar y transcribir automáticamente.</p>
    </div>`}
  </div>`;

  const now=new Date();
  const thisMonth=allMeetings.filter(m=>{ const d=parseDate(m.date); return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear(); }).length;
  const el=document.getElementById('ov-month'); if(el) el.textContent=thisMonth;
  const sv=document.getElementById('ov-status'); if(sv) sv.textContent=document.getElementById('status-text').textContent==='Activo'?'Activo':'Error';
}

function renderSidebar(){
  const q=document.getElementById('search').value.toLowerCase().trim();
  let list=[...allMeetings];
  if(activeFilter==='recent'){ const week=Date.now()-7*24*60*60*1000; list=list.filter(m=>parseDate(m.date).getTime()>week); }
  else if(activeFilter==='action'){ list=list.filter(m=>m.preview&&m.preview.toLowerCase().includes('action')); }
  if(q) list=list.filter(m=>m.title.toLowerCase().includes(q)||m.preview.toLowerCase().includes(q)||m.date.toLowerCase().includes(q));

  const container=document.getElementById('meeting-list');
  if(!list.length){
    container.innerHTML=`<div style="padding:40px 16px;text-align:center;color:var(--text-4);font-size:13px">${q?'Sin resultados':'No hay reuniones'}</div>`;
    return;
  }
  const groups={};
  list.forEach(m=>{ const key=fmtMonth(m.date); if(!groups[key]) groups[key]=[]; groups[key].push(m); });
  container.innerHTML=Object.entries(groups).map(([month,items])=>`
    <div class="month-label">${month}</div>
    ${items.map(m=>`
    <div class="mcard ${activeMeeting===m.file?'active':''}" onclick="selectMeeting('${esc(m.file)}')">
      <div class="mcard-top">
        <span class="mcard-date">${fmtShort(m.date)}</span>
        ${m.duration?`<span class="mcard-duration">${I.clock} ${esc(m.duration)}</span>`:''}
      </div>
      <div class="mcard-title">${esc(m.title)}</div>
      <div class="mcard-preview">${esc(m.preview.replace(/^#+[^\n]+\n*/gm,'').replace(/\*\*/g,'').substring(0,100))}</div>
    </div>`).join('')}
  `).join('');
}

async function selectMeeting(file){
  activeMeeting=file;
  renderSidebar();
  toggleSidebar(false);
  const content=document.getElementById('content');
  content.innerHTML='<div class="loading"><div class="spinner"></div></div>';
  try{
    const res=await fetch(API+'/meeting/'+encodeURIComponent(file));
    if(!res.ok) throw new Error('No se pudo cargar la reunión');
    const data=await res.json();
    const meeting=allMeetings.find(m=>m.file===file);
    renderDetail(meeting,data);
  }catch(err){
    toast('error','Error al cargar', err.message);
    content.innerHTML=`<div class="empty"><div class="empty-icon" style="background:rgba(239,68,68,0.1);border-color:rgba(239,68,68,0.2);color:var(--red)">${I.err}</div><h2>No se pudo cargar</h2><p>${esc(err.message)}</p></div>`;
  }
}

function renderDetail(meeting, data){
  const content=document.getElementById('content');
  const insights=data.insights||null;
  const sections=insights?{
    summary:insights.summary||'', keyPoints:insights.keyPoints||[],
    actionItems:insights.actionItems||[], decisions:insights.decisions||[], raw:data.content||'',
    durationMs:insights.durationMs||null,
  }:extractSections(data.content||'');
  const transcript=data.transcript||sections.raw;
  const file=meeting.file;
  const durStr = sections.durationMs ? fmtDuration(sections.durationMs) : null;

  const tabs=[
    {id:'summary',label:'Resumen'},
    {id:'keypoints',label:'Puntos clave'},
    {id:'actions',label:'Tareas',count:sections.actionItems.length},
    {id:'decisions',label:'Decisiones'},
    {id:'transcript',label:'Transcripción'},
    {id:'report',label:'Reporte'},
  ];

  content.innerHTML=`
  <div class="detail">
    <div class="detail-header">
      <div class="detail-breadcrumb">
        <a onclick="showOverview();return false">Inicio</a>
        ${I.arrow} ${esc(fmtShort(meeting.date))}
      </div>
      <div style="display:flex;align-items:flex-start;gap:16px;flex-wrap:wrap">
        <div style="flex:1;min-width:200px">
          <div class="detail-title">${esc(meeting.title)}</div>
          <div class="detail-meta">
            <div class="dmeta">${I.cal} ${fmtFull(meeting.date)}</div>
            ${durStr?`<div class="dmeta">${I.clock} ${durStr}</div>`:''}
            ${sections.actionItems.length?`<div class="dmeta">${I.check} ${sections.actionItems.length} tareas</div>`:''}
            ${sections.decisions.length?`<div class="dmeta">${I.decide} ${sections.decisions.length} decisiones</div>`:''}
          </div>
        </div>
        <div class="detail-actions">
          <div class="export-wrap">
            <button class="btn" onclick="toggleExport(event)">${I.dl} Exportar ${I.arrow}</button>
            <div class="export-menu" id="export-menu">
              <a onclick="exportMeeting('${esc(file)}','md')">${I.doc} Markdown (.md)</a>
              <a onclick="exportMeeting('${esc(file)}','txt')">${I.doc} Texto plano (.txt)</a>
            </div>
          </div>
          <button class="btn btn-danger" onclick="deleteMeeting('${esc(file)}')">${I.trash} Eliminar</button>
        </div>
      </div>
      <div class="tabs" id="tabs-wrap">
        ${tabs.map(t=>`
        <div class="tab ${activeTab===t.id?'active':''}" data-tab="${t.id}" onclick="switchTab('${t.id}')">
          ${t.label}${t.count?` <span class="tab-badge">${t.count}</span>`:''}
        </div>`).join('')}
      </div>
    </div>
    <div class="tab-content" id="tab-content">
      ${renderTab(activeTab,sections,transcript||'')}
    </div>
  </div>`;

  // Store for tab switching
  content.__sections=sections;
  content.__transcript=transcript||'';
}

function switchTab(tab){
  activeTab=tab;
  document.querySelectorAll('.tab').forEach(el=>el.classList.toggle('active', el.dataset.tab===tab));
  const content=document.getElementById('content');
  document.getElementById('tab-content').innerHTML=renderTab(tab, content.__sections, content.__transcript);
}

function renderTab(tab, s, transcript){
  switch(tab){
    case 'summary': return renderSummary(s);
    case 'keypoints': return renderKeyPoints(s);
    case 'actions': return renderActions(s);
    case 'decisions': return renderDecisions(s);
    case 'transcript': return renderTranscript(transcript);
    case 'report': return renderReport(s, transcript);
    default: return renderSummary(s);
  }
}

function renderSummary(s){
  if(s.summary) return `<div class="block"><div class="block-body">${md(s.summary)}</div></div>`;
  return `<div class="raw-content">${md(s.raw)}</div>`;
}
function renderKeyPoints(s){
  if(!s.keyPoints.length) return `<div style="color:var(--text-4);font-size:13px;padding:16px 0">No se identificaron puntos clave.</div>`;
  return `<div class="kp-list">${s.keyPoints.map(kp=>`<div class="kp-item"><div class="kp-dot"></div><div class="kp-text">${esc(kp)}</div></div>`).join('')}</div>`;
}
function renderActions(s){
  if(!s.actionItems.length) return `<div style="color:var(--text-4);font-size:13px;padding:16px 0">No se identificaron tareas.</div>`;
  const id=activeMeeting||'';
  if(!doneActions[id]) doneActions[id]={};
  return `<div class="action-list">${s.actionItems.map((a,i)=>{
    const done=doneActions[id][i]||false;
    return `<div class="action-item">
      <div class="action-check ${done?'done':''}" onclick="toggleAction(${i})"></div>
      <div class="action-text ${done?'done':''}" id="act-${i}">${esc(a)}</div>
    </div>`;
  }).join('')}</div>`;
}
function toggleAction(i){
  const id=activeMeeting||''; if(!doneActions[id]) doneActions[id]={};
  doneActions[id][i]=!doneActions[id][i];
  const check=document.querySelectorAll('.action-check')[i], text=document.getElementById('act-'+i);
  if(check) check.classList.toggle('done',doneActions[id][i]);
  if(text) text.classList.toggle('done',doneActions[id][i]);
  saveDoneActions();
}
function renderDecisions(s){
  if(!s.decisions.length) return `<div style="color:var(--text-4);font-size:13px;padding:16px 0">No se registraron decisiones.</div>`;
  return `<div class="decision-list">${s.decisions.map(d=>`<div class="decision-item"><div class="decision-icon">${I.decide}</div><div class="decision-text">${esc(d)}</div></div>`).join('')}</div>`;
}
function renderTranscript(transcript){
  if(!transcript||!transcript.trim()) return `<div style="color:var(--text-4);font-size:13px">No hay transcripción disponible.</div>`;
  return `<div class="transcript-box">${esc(transcript)}</div>`;
}
function renderReport(s, transcript){
  const words=transcript?transcript.split(/\s+/).length:0;
  const durStr = s.durationMs ? fmtDuration(s.durationMs) : (words ? `~${Math.round(words/130)} min` : '—');
  return `
  <div class="report-grid">
    <div class="report-stat"><div class="report-stat-label">Tareas</div><div class="report-stat-value amber">${s.actionItems.length}</div></div>
    <div class="report-stat"><div class="report-stat-label">Decisiones</div><div class="report-stat-value green">${s.decisions.length}</div></div>
    <div class="report-stat"><div class="report-stat-label">Puntos clave</div><div class="report-stat-value cyan">${s.keyPoints.length}</div></div>
    <div class="report-stat"><div class="report-stat-label">${s.durationMs?'Duración':'Duración aprox.'}</div><div class="report-stat-value">${durStr}</div></div>
  </div>
  ${s.summary?`<div class="report-section-title">Resumen ejecutivo</div><div class="block-body">${md(s.summary)}</div>`:''}
  ${s.actionItems.length?`<div class="report-section-title">Tareas pendientes</div><div class="action-list">${s.actionItems.map((a,i)=>`
    <div class="action-item"><div class="action-check ${(doneActions[activeMeeting]||{})[i]?'done':''}"></div><div class="action-text">${esc(a)}</div></div>`).join('')}</div>`:''}`;
}

function toggleExport(e){
  e.stopPropagation();
  const m=document.getElementById('export-menu');
  m.classList.toggle('show');
  const onDoc=(ev)=>{ if(!m.contains(ev.target)){ m.classList.remove('show'); document.removeEventListener('click', onDoc);} };
  setTimeout(()=>document.addEventListener('click', onDoc), 0);
}
function exportMeeting(file, format){
  window.open(`${API}/meeting/${encodeURIComponent(file)}?format=${format}`, '_blank');
  document.getElementById('export-menu')?.classList.remove('show');
}

async function deleteMeeting(file){
  const m=allMeetings.find(x=>x.file===file);
  const title=m?m.title:file;
  const ok = await confirmAction('¿Eliminar reunión?', `"${title}" se borrará permanentemente junto con su audio, transcripción y resumen. Esta acción no se puede deshacer.`, 'Eliminar');
  if(!ok) return;
  try{
    const res=await fetch(`${API}/meeting/${encodeURIComponent(file)}`, { method:'DELETE' });
    if(!res.ok) throw new Error('No se pudo eliminar');
    const data=await res.json();
    toast('success', 'Reunión eliminada', `${data.deleted?.length||0} archivos borrados.`);
    await loadMeetings();
    showOverview();
  }catch(err){
    toast('error', 'Error al eliminar', err.message);
  }
}

async function loadMeetings(){
  try{
    const res=await fetch(API+'/meetings');
    if(!res.ok) throw new Error('Error ' + res.status);
    const data=await res.json();
    allMeetings=data.meetings||[];
    // Try to enrich with duration by fetching insights (in background, non-blocking)
    document.getElementById('stat-total').textContent=allMeetings.length;
    renderSidebar();
  }catch(e){
    console.error(e);
    toast('error', 'No se pudieron cargar las reuniones', e.message);
  }
}

async function checkHealth(){
  try{
    const res=await fetch(API+'/health');
    const data=await res.json();
    const badge=document.getElementById('status-badge'), text=document.getElementById('status-text');
    const ok=data.status==='ok';
    badge.className='status-badge '+(ok?'ok':'err');
    text.textContent=ok?'Activo':'Error';
  }catch{
    const badge=document.getElementById('status-badge'), text=document.getElementById('status-text');
    badge.className='status-badge err'; text.textContent='Desconectado';
  }
}

// Filters
document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active'); activeFilter=btn.dataset.filter; renderSidebar();
  });
});
document.getElementById('search').addEventListener('input',()=>renderSidebar());

// ESC closes modal
document.addEventListener('keydown',(e)=>{ if(e.key==='Escape') closeModal(); });

// Init
loadDoneActions();
checkHealth();
loadMeetings().then(showOverview);
setInterval(()=>{checkHealth();loadMeetings();}, 30000);
</script>
</body>
</html>
